en:
  access_closed: |-
    This bot is not accepting new users. Only existing users may use it.
  start: |-
    Subscription enabled. Send reminders in natural language.
    "Please remind me to send 100$ to Alexei at 4th april"

    Default timezone: {default_timezone}
    Use /set_timezone Europe/Rome to set your timezone.
  stop: Subscription disabled.
  help: |-
    Commands:
    /start - subscribe and enable reminder parsing
    /stop - unsubscribe
    /set_timezone <Area/City> - set your timezone
    /list - list pending reminders

    Then send any reminder request in plain language.
  no_pending: No pending reminders.
  pending_header: "Pending reminders:"
  set_timezone_missing: |-
    Please provide timezone, for example:
    /set_timezone Europe/Rome
  set_timezone_invalid: |-
    Unknown timezone. Use IANA format like Europe/Rome,
    Europe/Kyiv, America/New_York.
  set_timezone_saved: "Timezone saved: {timezone}"
  unsubscribed: You are unsubscribed. Use /start to enable reminders.
  gemini_error: |-
    Reminder service error: Gemini is not responding right now.
    Please try again in a minute.
  parse_error: I could not parse this reminder right now. Please try again.
  not_schedulable: I did not detect a schedulable reminder in that message.
  delete_none: There are no pending reminders to delete.
  delete_not_found: I could not find a matching reminder to delete.
  delete_done: "Deleted reminders: {count}"
  saved: "Reminder saved for {when}: {text}"
  list_recur_minute: "every {n} min"
  list_recur_hour: "every {n} h"
  list_recur_day: "every {n} days"
  list_recur_week: "every {n} weeks"
  list_recur_weekly: "weekly on {days}"

ru:
  access_closed: |-
    Бот не принимает новых пользователей. Доступ только у уже зарегистрированных.
  start: |-
    Подписка включена. Отправляйте напоминания обычным текстом.
    "Напомни мне отправить 100$ Алексею 4 апреля"

    Часовой пояс по умолчанию: {default_timezone}
    Используйте /set_timezone Europe/Moscow для своего пояса.
  stop: Подписка отключена.
  help: |-
    Команды:
    /start - включить подписку и распознавание напоминаний
    /stop - отключить подписку
    /set_timezone <Area/City> - установить часовой пояс
    /list - список активных напоминаний

    После этого отправьте напоминание обычным текстом.
  no_pending: "Активных напоминаний нет."
  pending_header: "Активные напоминания:"
  set_timezone_missing: |-
    Укажите часовой пояс, например:
    /set_timezone Europe/Moscow
  set_timezone_invalid: |-
    Неизвестный часовой пояс. Используйте формат IANA:
    Europe/Moscow, Europe/Kyiv, America/New_York.
  set_timezone_saved: "Часовой пояс сохранен: {timezone}"
  unsubscribed: Вы отключены от подписки. Используйте /start, чтобы включить.
  gemini_error: |-
    Ошибка сервиса напоминаний: сейчас не получается связаться
    с Gemini. Попробуйте еще раз через минуту.
  parse_error: Сейчас не получилось разобрать напоминание. Попробуйте еще раз.
  not_schedulable: Не удалось найти в сообщении напоминание с временем.
  delete_none: Нет активных напоминаний для удаления.
  delete_not_found: Не удалось найти подходящее напоминание для удаления.
  delete_done: "Удалено напоминаний: {count}"
  saved: "Напоминание сохранено на {when}: {text}"
  list_recur_minute: "каждые {n} мин"
  list_recur_hour: "каждые {n} ч"
  list_recur_day: "каждые {n} дн."
  list_recur_week: "каждые {n} нед."
  list_recur_weekly: "по дням: {days}"

it:
  access_closed: |-
    Il bot non accetta nuovi utenti. Solo gli utenti già registrati possono usarlo.
  start: |-
    Abbonamento attivato. Invia promemoria in linguaggio naturale.
    "Per favore ricordami di mandare 100$ ad Alexei il 4 aprile"

    Fuso orario predefinito: {default_timezone}
    Usa /set_timezone Europe/Rome per impostare il tuo fuso.
  stop: Abbonamento disattivato.
  help: |-
    Comandi:
    /start - attiva iscrizione e analisi promemoria
    /stop - disattiva iscrizione
    /set_timezone <Area/City> - imposta il fuso orario
    /list - elenco dei promemoria attivi

    Poi invia un promemoria in linguaggio naturale.
  no_pending: Nessun promemoria attivo.
  pending_header: "Promemoria attivi:"
  set_timezone_missing: |-
    Inserisci il fuso orario, ad esempio:
    /set_timezone Europe/Rome
  set_timezone_invalid: |-
    Fuso orario sconosciuto. Usa il formato IANA:
    Europe/Rome, Europe/Kyiv, America/New_York.
  set_timezone_saved: "Fuso orario salvato: {timezone}"
  unsubscribed: Hai disattivato l'iscrizione. Usa /start per riattivarla.
  gemini_error: |-
    Errore del servizio promemoria: Gemini non risponde adesso.
    Riprova tra un minuto.
  parse_error: Non riesco a interpretare questo promemoria adesso. Riprova.
  not_schedulable: Non ho rilevato un promemoria pianificabile nel messaggio.
  delete_none: Non ci sono promemoria attivi da eliminare.
  delete_not_found: Non trovo un promemoria corrispondente da eliminare.
  delete_done: "Promemoria eliminati: {count}"
  saved: "Promemoria salvato per {when}: {text}"
  list_recur_minute: "ogni {n} min"
  list_recur_hour: "ogni {n} h"
  list_recur_day: "ogni {n} giorni"
  list_recur_week: "ogni {n} settimane"
  list_recur_weekly: "settimanale: {days}"

