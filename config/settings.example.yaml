telegram_bot_token: "your-telegram-bot-token"
api_key: "your-llm-api-key"

# Model id for the configured llm_provider (e.g. Gemini or OpenAI model name).
model_name: "gemini-3.1-flash-lite-preview"

# LLM backend: gemini (default) or openai_compatible (OpenAI API, OpenRouter, local servers).
# llm_provider: gemini
# For openai_compatible, set model_name to the remote model id and optionally override the API base.
# llm_provider: openai_compatible
# llm_base_url: "https://openrouter.ai/api/v1"

# App behavior
default_timezone: "UTC"
database_path: "notifyme.sqlite3"
# When false, only Telegram user_ids already present in the users table may use the bot.
allow_new_users: true
